<!doctype html>
<html lang="en" data-current-lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4efe6">
    <meta name="description" content="{{ site.description }}">
    <title>{% if page.title and page.title != 'Home' %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </head>
  <body data-page="{{ page.nav | default: 'home' }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <div class="header-inner shell">
        <a class="site-label" href="{{ '/' | relative_url }}" aria-label="Home">SS / notes</a>
        <nav class="main-nav" aria-label="Main navigation">
          <a data-nav="home" href="{{ '/' | relative_url }}"><span data-lang="en">Home</span><span data-lang="ja">Home</span></a>
          <a data-nav="math" href="{{ '/math/' | relative_url }}"><span data-lang="en">Math</span><span data-lang="ja">Math</span></a>
          <a data-nav="research" href="{{ '/research/' | relative_url }}"><span data-lang="en">Research</span><span data-lang="ja">Research</span></a>
        </nav>
        <div class="language-switch" role="group" aria-label="Language">
          <button type="button" data-set-lang="en" aria-pressed="true">EN</button><span>/</span><button type="button" data-set-lang="ja" aria-pressed="false">JP</button>
        </div>
      </div>
    </header>

    {{ content }}

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p>© {{ 'now' | date: '%Y' }} Soma Saito · <span data-lang="en">CC BY 4.0 unless noted</span><span data-lang="ja">特記なき限り CC BY 4.0</span></p>
        <a class="back-top" href="#"><span data-lang="en">Top</span><span data-lang="ja">上へ</span> ↑</a>
      </div>
    </footer>
  </body>
</html>
